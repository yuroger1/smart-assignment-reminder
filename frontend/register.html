<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Smart Assignment Reminder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg bg-white shadow-sm">
    <div class="container">
        <a class="navbar-brand brand-wrapper" href="index.html">
            <img src="images/logo.png" alt="Smart Assignment Reminder Logo" class="brand-logo">

            <div class="brand-text">
                <div class="brand-main">Smart Assignment</div>
                <div class="brand-sub">Reminder</div>
            </div>
        </a>
        <a href="login.html" class="btn btn-outline-primary">Login</a>
    </div>
</nav>

<div class="container auth-page">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card shadow p-4 auth-card">
                <h3 class="text-center mb-4">Create Account</h3>

                <div id="registerMessage"></div>

                <form id="registerForm">
                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" id="registerName" class="form-control" autocomplete="name" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" id="registerEmail" class="form-control" autocomplete="email" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" id="registerPassword" class="form-control" autocomplete="new-password" minlength="8" required>
                        <div class="form-text">Use at least 8 characters.</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" id="registerConfirmPassword" class="form-control" autocomplete="new-password" minlength="8" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Register</button>
                </form>

                <div class="auth-divider">
                    <span>or</span>
                </div>

                <div id="googleSignInButton" class="google-auth-slot" data-text="signup_with"></div>
                <div id="googleAuthStatus" class="mt-3"></div>

                <p class="text-center mt-3">
                    Already have an account?
                    <a href="login.html">Login here</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="js/auth.js"></script>
</body>
</html>
