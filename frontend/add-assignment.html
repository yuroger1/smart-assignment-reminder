<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Assignment - Smart Assignment Reminder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg bg-white shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="dashboard.html">Smart Assignment Reminder</a>

        <div>
            <span id="userName" class="me-3"></span>
            <a href="dashboard.html" class="btn btn-outline-primary btn-sm me-2">Dashboard</a>
            <a href="add-course.html" class="btn btn-outline-secondary btn-sm me-2">Add Course</a>
            <button id="logoutBtn" class="btn btn-outline-danger btn-sm">Logout</button>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <div class="card shadow-sm p-4">
        <h3>Add New Assignment</h3>
        <p class="text-muted">
            Add a new assignment with course, description, due date, and priority.
        </p>

        <form id="assignmentForm" class="row g-3 mt-2">

            <div class="col-md-6">
                <label class="form-label">Assignment Title</label>
                <input type="text" id="assignmentTitle" class="form-control" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Course</label>
                <select id="assignmentCourse" class="form-select">
                    <option value="">No Course</option>
                </select>
            </div>

            <div class="col-md-12">
                <label class="form-label">Description</label>
                <textarea id="assignmentDescription" class="form-control" rows="3"></textarea>
            </div>

            <div class="col-md-6">
                <label class="form-label">Due Date</label>
                <input type="datetime-local" id="assignmentDueDate" class="form-control" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Priority</label>
                <select id="assignmentPriority" class="form-select">
                    <option value="Low">Low</option>
                    <option value="Medium" selected>Medium</option>
                    <option value="High">High</option>
                </select>
            </div>

            <div class="col-md-12">
                <button type="submit" class="btn btn-primary">Add Assignment</button>
                <a href="dashboard.html" class="btn btn-outline-secondary ms-2">Cancel</a>
            </div>

        </form>
    </div>

</div>

<script src="js/add-assignment.js"></script>
</body>
</html>
