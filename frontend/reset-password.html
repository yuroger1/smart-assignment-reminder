<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password - Smart Assignment Reminder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg bg-white shadow-sm">
    <div class="container">
        <a class="navbar-brand brand-wrapper" href="index.html">
            <img src="images/logo.png" alt="Smart Assignment Reminder Logo" class="brand-logo">

            <div class="brand-text">
                <div class="brand-main">Smart Assignment</div>
                <div class="brand-sub">Reminder</div>
            </div>
        </a>
        <a href="login.html" class="btn btn-outline-primary">Login</a>
    </div>
</nav>

<div class="container auth-page">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card shadow p-4 auth-card">
                <h3 class="text-center mb-3">Choose New Password</h3>
                <p class="text-muted text-center mb-4">
                    Create a new password with at least 8 characters.
                </p>

                <div id="resetPasswordMessage"></div>

                <form id="resetPasswordForm">
                    <div class="mb-3">
                        <label class="form-label">New Password</label>
                        <input type="password" id="resetPassword" class="form-control" autocomplete="new-password" minlength="8" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Confirm New Password</label>
                        <input type="password" id="resetConfirmPassword" class="form-control" autocomplete="new-password" minlength="8" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Reset Password</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="js/auth.js"></script>
</body>
</html>
