<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Smart Assignment Reminder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg bg-white shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="dashboard.html">Smart Assignment Reminder</a>
        <div>
            <span id="userName" class="me-3"></span>
            <button id="logoutBtn" class="btn btn-outline-danger btn-sm">Logout</button>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <h2 class="mb-4">Dashboard</h2>

    <!-- Summary Cards -->
    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="card summary-card shadow-sm p-3">
                <div class="summary-number" id="totalCount">0</div>
                <div>Total Assignments</div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card summary-card shadow-sm p-3">
                <div class="summary-number text-warning" id="dueSoonCount">0</div>
                <div>Due Soon</div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card summary-card shadow-sm p-3">
                <div class="summary-number text-danger" id="overdueCount">0</div>
                <div>Overdue</div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card summary-card shadow-sm p-3">
                <div class="summary-number text-success" id="completedCount">0</div>
                <div>Completed</div>
            </div>
        </div>
    </div>

    <!-- Add Assignment Form -->
    <div class="card shadow-sm p-4 mb-4">
        <h4>Add New Assignment</h4>

        <form id="assignmentForm" class="row g-3 mt-2">
            <div class="col-md-6">
                <label class="form-label">Assignment Title</label>
                <input type="text" id="assignmentTitle" class="form-control" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Course</label>
                <select id="assignmentCourse" class="form-select">
                    <option value="">No Course</option>
                </select>
            </div>

            <div class="col-md-12">
                <label class="form-label">Description</label>
                <textarea id="assignmentDescription" class="form-control" rows="2"></textarea>
            </div>

            <div class="col-md-6">
                <label class="form-label">Due Date</label>
                <input type="datetime-local" id="assignmentDueDate" class="form-control" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Priority</label>
                <select id="assignmentPriority" class="form-select">
                    <option value="Low">Low</option>
                    <option value="Medium" selected>Medium</option>
                    <option value="High">High</option>
                </select>
            </div>

            <div class="col-md-12">
                <button type="submit" class="btn btn-primary">Add Assignment</button>
            </div>
        </form>
    </div>

    <!-- Add Course Form -->
    <div class="card shadow-sm p-4 mb-4">
        <h4>Add Course</h4>

        <form id="courseForm" class="row g-3 mt-2">
            <div class="col-md-5">
                <label class="form-label">Course Name</label>
                <input type="text" id="courseName" class="form-control" required>
            </div>

            <div class="col-md-5">
                <label class="form-label">Instructor</label>
                <input type="text" id="courseInstructor" class="form-control">
            </div>

            <div class="col-md-2 d-flex align-items-end">
                <button type="submit" class="btn btn-secondary w-100">Add Course</button>
            </div>
        </form>
    </div>

    <!-- Search and Filter -->
    <div class="card shadow-sm p-4 mb-4">
        <h4>Search and Filter</h4>

        <div class="row g-3 mt-2">
            <div class="col-md-3">
                <input type="text" id="searchInput" class="form-control" placeholder="Search by title">
            </div>

            <div class="col-md-3">
                <select id="courseFilter" class="form-select">
                    <option value="">All Courses</option>
                </select>
            </div>

            <div class="col-md-2">
                <select id="statusFilter" class="form-select">
                    <option value="">All Status</option>
                    <option value="Pending">Pending</option>
                    <option value="Completed">Completed</option>
                </select>
            </div>

            <div class="col-md-2">
                <select id="sortSelect" class="form-select">
                    <option value="">Newest First</option>
                    <option value="due_date">Sort by Due Date</option>
                </select>
            </div>

            <div class="col-md-1">
                <button id="filterBtn" class="btn btn-outline-primary w-100">Apply</button>
            </div>

            <div class="col-md-1">
                <button id="resetFilterBtn" class="btn btn-outline-secondary w-100">Reset</button>
            </div>
        </div>
    </div>

    <!-- Reminder Section -->
    <div class="card shadow-sm p-4 mb-4">
        <h4>Reminder</h4>
        <div id="notificationList">
            <p class="text-muted">Loading reminders...</p>
        </div>
    </div>

    <!-- Assignment List -->
    <div class="card shadow-sm p-4 mb-5">
        <h4>Assignments</h4>
        <div id="assignmentList" class="mt-3">
            <p class="text-muted">Loading assignments...</p>
        </div>
    </div>

    <!-- Edit Assignment Modal -->
<div class="modal fade" id="editAssignmentModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Edit Assignment</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <form id="editAssignmentForm" class="row g-3">

                    <input type="hidden" id="editAssignmentId">

                    <div class="col-md-6">
                        <label class="form-label">Assignment Title</label>
                        <input type="text" id="editAssignmentTitle" class="form-control" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Course</label>
                        <select id="editAssignmentCourse" class="form-select">
                            <option value="">No Course</option>
                        </select>
                    </div>

                    <div class="col-md-12">
                        <label class="form-label">Description</label>
                        <textarea id="editAssignmentDescription" class="form-control" rows="2"></textarea>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Due Date</label>
                        <input type="datetime-local" id="editAssignmentDueDate" class="form-control" required>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Priority</label>
                        <select id="editAssignmentPriority" class="form-select">
                            <option value="Low">Low</option>
                            <option value="Medium">Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Status</label>
                        <select id="editAssignmentStatus" class="form-select">
                            <option value="Pending">Pending</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>

                    <div class="col-md-12">
                        <button type="submit" class="btn btn-primary">
                            Save Changes
                        </button>
                    </div>

                </form>
            </div>

        </div>
    </div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/dashboard.js"></script>
</body>
</html>
