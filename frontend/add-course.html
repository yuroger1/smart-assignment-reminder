<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Course - Smart Assignment Reminder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg bg-white shadow-sm">
    <div class="container">
        <a class="navbar-brand brand-wrapper" href="dashboard.html">
            <img src="images/logo.png" alt="Smart Assignment Reminder Logo" class="brand-logo">

            <div class="brand-text">
                <div class="brand-main">Smart Assignment</div>
                <div class="brand-sub">Reminder</div>
            </div>
        </a>

        <div>
            <span id="userName" class="me-3"></span>
            <a href="dashboard.html" class="btn btn-outline-primary btn-sm me-2">Dashboard</a>
            <a href="add-assignment.html" class="btn btn-outline-secondary btn-sm me-2">Add Assignment</a>
            <button id="logoutBtn" class="btn btn-outline-danger btn-sm">Logout</button>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <!-- Add Course Form -->
    <div class="card shadow-sm p-4 mb-4">
        <h3>Add Course</h3>
        <p class="text-muted">
            Add a course so you can connect assignments to the correct class.
        </p>

        <form id="courseForm" class="row g-3 mt-2">

            <div class="col-md-12">
                <label class="form-label">Course Name</label>
                <input type="text" id="courseName" class="form-control" required>
            </div>

            <div class="col-md-12">
                <button type="submit" class="btn btn-secondary">Add Course</button>
                <a href="dashboard.html" class="btn btn-outline-secondary ms-2">Cancel</a>
            </div>

        </form>
    </div>

    <!-- Course List -->
    <div class="card shadow-sm p-4 mb-4">
        <h3>My Courses</h3>
        <p class="text-muted">
            You can edit existing course information here.
        </p>

        <div id="courseList">
            <p class="text-muted">Loading courses...</p>
        </div>
    </div>

</div>

<!-- Edit Course Modal -->
<div class="modal fade" id="editCourseModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Edit Course</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <form id="editCourseForm">

                    <input type="hidden" id="editCourseId">

                    <div class="mb-3">
                        <label class="form-label">Course Name</label>
                        <input type="text" id="editCourseName" class="form-control" required>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        Save Changes
                    </button>

                </form>
            </div>

        </div>
    </div>
</div>

<!-- Bootstrap JS for Modal -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Page JS -->
<script src="js/add-course.js"></script>
</body>
</html>
